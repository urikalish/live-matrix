name: Scheduled Videos Update

on:
  schedule:
    # Runs every day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run scheduled videos update
        env:
          UPDATE_VIDEOS_YOUTUBEI_BROWSE_KEY: ${{ secrets.UPDATE_VIDEOS_YOUTUBEI_BROWSE_KEY }}
        run: yarn update

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add update-videos/channel-ids.json update-videos/channels-no-videos.json src/public/videos.json
          git commit -m "chore: scheduled videos update"
          git push
