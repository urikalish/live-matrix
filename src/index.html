<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveMatrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="masthead">
        <div class="masthead--left-side">
          <span class="masthead-title">⚡ LiveMatrix</span>
        </div>
        <div class="masthead--right-side">
          <div id="masthead-search" class="masthead-search">
            <input
              id="masthead-search-input"
              class="masthead-search-input"
              type="search"
              placeholder="Search videos or channels"
              autocomplete="off"
              spellcheck="false"
              aria-label="Search videos"
            />
            <div id="masthead-search-results" class="masthead-search-results" role="listbox"></div>
          </div>
          <button id="shuffle-button" class="masthead-btn masthead-btn--shuffle" data-action="shuffle">Shuffle</button>
          <div id="layout-actions-container" class="layout-actions-container"></div>
        </div>
      </div>
      <div id="matrix-container" class="matrix-container"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
