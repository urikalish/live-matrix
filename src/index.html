<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveMatrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="masthead">
        <div class="masthead--left-side"></div>
        <div class="masthead--right-side">
          <button data-action="refresh" >Refresh</button>
          <button data-action="layout" data-cols="1" data-rows="1">1x1</button>
          <button data-action="layout" data-cols="2" data-rows="1">2x1</button>
          <button data-action="layout" data-cols="3" data-rows="2">3x2</button>
          <button data-action="layout" data-cols="4" data-rows="3">4x3</button>
          <button data-action="layout" data-cols="5" data-rows="4">5x4</button>
          <button data-action="layout" data-cols="6" data-rows="5">6x5</button>
        </div>
      </div>
      <div id="matrix-container" class="matrix-container"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
